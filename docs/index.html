<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="网球相关电子书与资料收藏 — tennis-book" />
  <title>tennis-book · 网球书籍</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8eef4;
      --muted: #8b9cb0;
      --accent: #3d9a5b;
      --accent-dim: #2d7344;
      --link: #6ec8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a3d2a 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover {
      border-color: var(--accent);
      background: #223040;
    }
    .btn-primary {
      background: linear-gradient(145deg, var(--accent), var(--accent-dim));
      border-color: transparent;
      color: #fff;
    }
    .btn-primary:hover {
      filter: brightness(1.08);
      border-color: transparent;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 1rem;
    }
    ul.books {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    ul.books li a {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.85rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s, transform 0.12s;
    }
    ul.books li a:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }
    ul.books li a::before {
      content: "";
      flex-shrink: 0;
      width: 0.35rem;
      margin-top: 0.45rem;
      height: 0.35rem;
      border-radius: 50%;
      background: var(--accent);
    }
    .name { flex: 1; min-width: 0; word-break: break-word; }
    .ext {
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--link); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>tennis-book</h1>
      <p class="tagline">个人收藏的网球主题电子书与资料，涵盖技术、训练、传记与运动科学。</p>
      <div class="actions">
        <a class="btn btn-primary" id="repo-link" href="https://github.com/victorsheng/tennis-book" rel="noopener noreferrer">在 GitHub 上查看仓库</a>
        <a class="btn" href="https://github.com/victorsheng/tennis-book/blob/master/README.md" rel="noopener noreferrer">README</a>
      </div>
    </header>

    <section aria-labelledby="books-heading">
      <h2 id="books-heading">书目</h2>
      <ul class="books" id="book-list"></ul>
    </section>

    <footer>
      <p>本站由 <a href="https://pages.github.com/" rel="noopener noreferrer">GitHub Pages</a> 托管。PDF 通过 Raw 链接从仓库直链下载；请遵守版权，仅限个人学习使用。</p>
    </footer>
  </div>

  <script>
    (function () {
      var OWNER = "victorsheng";
      var REPO = "tennis-book";
      var BRANCH = "master";
      var files = [
        "[网球技术精解全书].《网球》杂志.著.插图版.pdf",
        "tennis淺談網球步法訓練.pdf",
        "德约科维奇  一发制胜  我的14天身心逆转计划_13648186.pdf",
        "独自上场_13077137.pdf",
        "费德勒传 光影中的网坛传奇.pdf",
        "精准拉伸：疼痛消除和损伤预防的针对性练习.pdf",
        "拉法纳达尔自传_13400544.pdf",
        "牵伸解剖指南.pdf",
        "实用网球技巧提升200  _13225880.pdf",
        "网球提升  基础技巧与实战策略_13831982.pdf",
        "网球压力训练_上册.pdf",
        "网球压力训练_下册.pdf",
        "网球运动教程.陶志翔.pdf",
        "网球运动系统训练13800928.pdf",
        "网球制胜：实用技战术图解=Winning Tennis_13735994.pdf",
        "網球截擊技術及雙打「搶打戰術」之應用分析.pdf",
        "中国网协CTN网球等级智能测评指南.pdf"
      ];

      document.getElementById("repo-link").href =
        "https://github.com/" + OWNER + "/" + REPO;

      var base =
        "https://raw.githubusercontent.com/" +
        OWNER + "/" + REPO + "/" + BRANCH + "/";

      var ul = document.getElementById("book-list");
      files.forEach(function (name) {
        var li = document.createElement("li");
        var a = document.createElement("a");
        a.href = base + encodeURIComponent(name);
        a.rel = "noopener noreferrer";
        a.download = "";
        var spanName = document.createElement("span");
        spanName.className = "name";
        spanName.textContent = name.replace(/\.pdf$/i, "");
        var spanExt = document.createElement("span");
        spanExt.className = "ext";
        spanExt.textContent = "PDF";
        a.appendChild(spanName);
        a.appendChild(spanExt);
        li.appendChild(a);
        ul.appendChild(li);
      });
    })();
  </script>
</body>
</html>
